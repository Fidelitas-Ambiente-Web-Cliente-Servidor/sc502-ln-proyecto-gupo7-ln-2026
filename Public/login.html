<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Vida Rescate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-container d-flex justify-content-center align-items-center vh-100">
    <div class="login-box">
        <h2 class="text-center mb-4">Vida Rescate Atenas</h2>

        <form id="loginForm">
            <input type="email" class="form-control mb-3" id="email" placeholder="Correo electrónico" required>
            <input type="password" class="form-control mb-3" id="password" placeholder="Contraseña" required>

            <button type="submit" class="btn btn-success w-100">Entrar</button>
        </form>

        <p class="text-center mt-3">
            ¿No tienes cuenta?
            <a href="registro.html">Regístrate aquí</a>
        </p>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
