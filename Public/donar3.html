<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">

<div class="collapse navbar-collapse">
<ul class="navbar-nav ms-auto align-items-center">

<div class="secciones">
  <div class="descripcion">
    <h2>Donaciones Otros</h2>
    <img src="imagenes/donaciones_alimento.jpg" class="img-fluid">
    <p>Muchas gracias, con tu aporte podremos llevar esperanzas a mas animales.</p>
  </div>

  <div class="form-donaciones_monetarias">
    <h2>Formulario de donaciones</h2>
    <p>Por favor rellenar el siguiente formulario</p>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" placeholder="Escribe tu nombre">
    <div id="errorNombre" class="error"></div>

    <label for="monto">Ingrese la cantidad a donar:</label>
    <input type="number" id="monto">
    <div id="errorMonto" class="error"></div>

    <label for="fecha">Fecha:</label>
    <input type="date" id="fecha">
    <div id="errorFecha" class="error"></div>

    <label for="tipoDonacion">Tipo de donacion:</label>
    <select id="tipoDonacion">
        <option value="" disabled selected>Especifique el donativo</option>
        <option value="alimento">Alimento</option>
        <option value="Otro">Otro</option>
    </select>
    <div id="errortipoDonacion" class="error"></div>

    <div id="campoOtro" style="display:none;">
        <label>Especifique el donativo:</label>
        <input type="text" id="Donativo">
        <div id="errorTarjeta" class="error"></div>
    </div>

    <button type="button" id="btnDonar3">Donar</button>
  </div>
</div>

<script src="js/donar3.js"></script>
</body>
</html>
