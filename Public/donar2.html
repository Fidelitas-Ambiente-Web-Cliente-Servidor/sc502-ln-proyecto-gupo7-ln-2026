<div class="secciones">
  <!-- izquierda -->
  <div class="descripcion">
    <h2>Donaciones de Dinero</h2>
    <img src="imagenes/donaciones_dinero.jpg"  class="img-fluid">
    <p>
        Muchas gracias, con tu aporte podremos llevar esperanzas a mas animales. 
    </p>
  </div>

  <!-- derecha -->
<div class="form-donaciones_monetarias">
  <h2>Formulario de donaciones</h2>
  <p>Por favor rellenar el siguiente formulario</p>

  <label for="nombre">Nombre:</label>
  <input type="text" id="nombre" placeholder="Escribe tu nombre">
  <div id="errorNombre" class="error"></div>

  <label for="monto">Ingrese el monto a donar en colones:</label>
  <input type="number" id="monto">
  <div id="errorMonto" class="error"></div>

   <label for="fecha">Fecha:</label>
   <input type="date" id="fecha">
   <div id="errorFecha" class="error"></div>
   <script>
   document.addEventListener("DOMContentLoaded", () => {
    const fechaInput = document.getElementById("fecha");
    const hoy = new Date().toISOString().split("T")[0]; 
    fechaInput.value = hoy;   
    fechaInput.min = hoy;   
   });
   </script>

  <label for="tipoPago">Tipo de pago:</label>
  <select id="tipoPago">
    <option value="" disabled selected>Seleccione un método</option>
    <option value="efectivo">Efectivo</option>
    <option value="tarjeta">Tarjeta</option>
    <option value="transferencia">Transferencia</option>
  </select>
  <div id="errorTipoPago" class="error"></div>

  <div id="campoTarjeta" style="display:none;">
    <label for="numeroTarjeta">Número de tarjeta:</label>
    <input type="text" id="numeroTarjeta" placeholder="XXXX-XXXX-XXXX-XXXX">
    <div id="errorTarjeta" class="error"></div>
  </div>

  <button>Donar</button>
</div>

<script src="js/donar.js"></script>
</body>
