<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Evento | Vida Rescate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark fixed-top">
<div class="container">
<a class="navbar-brand">Vida Rescate Atenas</a>
<div>
    <a href="principal.html" class="btn btn-secondary me-2">
        ⬅ Volver al Inicio
    </a>

    <button class="btn btn-danger" onclick="cerrarSesion()">
        Cerrar Sesión
    </button>
</div>
</nav>

<div class="container mt-5 pt-5">
<h2>Registrar Nuevo Evento</h2>

<form id="eventoForm">

<div class="mb-3">
<input type="text" id="titulo" class="form-control" placeholder="Título del evento" required>
</div>

<div class="mb-3">
<textarea id="descripcion" class="form-control" placeholder="Descripción" required></textarea>
</div>

<div class="mb-3">
<input type="date" id="fecha" class="form-control" required>
</div>

<button type="submit" class="btn btn-success">Guardar Evento</button>

</form>
</div>

<script src="js/crear.js"></script>
</body>
</html>
